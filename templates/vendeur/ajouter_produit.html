{% extends "base.html" %}
{% block title %}Ajouter un produit{% endblock %}
{% block content %}
<h2>Ajouter un produit</h2>
<form method="POST" action="{{ url_for('vendeur.ajouter_produit') }}" enctype="multipart/form-data">
  <div class="mb-3">
    <label for="nom" class="form-label">Nom</label>
    <input type="text" class="form-control" id="nom" name="nom" required>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
  </div>
  <div class="mb-3">
    <label for="prix" class="form-label">Prix</label>
    <input type="number" step="0.01" class="form-control" id="prix" name="prix" required>
  </div>
  <div class="mb-3">
    <label for="ancien_prix" class="form-label">Ancien prix (optionnel)</label>
    <input type="number" step="0.01" class="form-control" id="ancien_prix" name="ancien_prix">
  </div>
  <div class="mb-3">
    <label for="quantite" class="form-label">Quantité</label>
    <input type="number" class="form-control" id="quantite" name="quantite" required>
  </div>
  <div class="mb-3">
    <label for="categorie" class="form-label">Catégorie</label>
    <select class="form-select" id="categorie" name="categorie">
      <option value="homme">Homme</option>
      <option value="femme">Femme</option>
      <option value="enfant">Enfant</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="taille" class="form-label">Taille</label>
    <select class="form-select" id="taille" name="taille">
      <option value="">Non précisée</option>
      <option value="XS">XS</option>
      <option value="S">S</option>
      <option value="M">M</option>
      <option value="L">L</option>
      <option value="XL">XL</option>
      <option value="Toutes les tailles">Toutes les tailles</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="marque" class="form-label">Marque</label>
    <input type="text" class="form-control" id="marque" name="marque" placeholder="Ex: Zara">
  </div>
  <div class="mb-3">
    <label for="localisation" class="form-label">Localisation</label>
    <input type="text" class="form-control" id="localisation" name="localisation" placeholder="Ex: Lubumbashi">
  </div>
  <div class="mb-3">
    <label for="image" class="form-label">Image principale</label>
    <input type="file" class="form-control" id="image" name="image" accept="image/*">
  </div>
  <div class="mb-3">
    <label for="images" class="form-label">Images supplémentaires</label>
    <input type="file" class="form-control" id="images" name="images" accept="image/*" multiple>
  </div>
  <button type="submit" class="btn btn-primary">Ajouter</button>
</form>
{% endblock %}
