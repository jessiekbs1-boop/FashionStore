{% extends "base.html" %}
{% block title %}Modifier le produit{% endblock %}
{% block content %}
<h2>Modifier le produit</h2>
<form method="POST" action="{{ url_for('vendeur.modifier_produit', produit_id=produit.id) }}" enctype="multipart/form-data">
  <div class="mb-3">
    <label for="nom" class="form-label">Nom</label>
    <input type="text" class="form-control" id="nom" name="nom" value="{{ produit.nom }}" required>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" id="description" name="description" rows="3">{{ produit.description }}</textarea>
  </div>
  <div class="mb-3">
    <label for="prix" class="form-label">Prix</label>
    <input type="number" step="0.01" class="form-control" id="prix" name="prix" value="{{ produit.prix }}" required>
  </div>
  <div class="mb-3">
    <label for="ancien_prix" class="form-label">Ancien prix</label>
    <input type="number" step="0.01" class="form-control" id="ancien_prix" name="ancien_prix" value="{{ produit.ancien_prix or '' }}">
  </div>
  <div class="mb-3">
    <label for="quantite" class="form-label">Quantité</label>
    <input type="number" class="form-control" id="quantite" name="quantite" value="{{ produit.quantite }}" required>
  </div>
  <div class="mb-3">
    <label for="categorie" class="form-label">Catégorie</label>
    <select class="form-select" id="categorie" name="categorie">
      <option value="homme" {% if produit.categorie == 'homme' %}selected{% endif %}>Homme</option>
      <option value="femme" {% if produit.categorie == 'femme' %}selected{% endif %}>Femme</option>
      <option value="enfant" {% if produit.categorie == 'enfant' %}selected{% endif %}>Enfant</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="taille" class="form-label">Taille</label>
    <select class="form-select" id="taille" name="taille">
      <option value="" {% if not produit.taille %}selected{% endif %}>Non précisée</option>
      <option value="XS" {% if produit.taille == 'XS' %}selected{% endif %}>XS</option>
      <option value="S" {% if produit.taille == 'S' %}selected{% endif %}>S</option>
      <option value="M" {% if produit.taille == 'M' %}selected{% endif %}>M</option>
      <option value="L" {% if produit.taille == 'L' %}selected{% endif %}>L</option>
      <option value="XL" {% if produit.taille == 'XL' %}selected{% endif %}>XL</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="marque" class="form-label">Marque</label>
    <input type="text" class="form-control" id="marque" name="marque" value="{{ produit.marque or '' }}">
  </div>
  <div class="mb-3">
    <label for="localisation" class="form-label">Localisation</label>
    <input type="text" class="form-control" id="localisation" name="localisation" value="{{ produit.localisation or '' }}">
  </div>
  <div class="mb-3">
    <label for="image" class="form-label">Image principale</label>
    {% if produit.image_principale %}
    <img src="{{ url_for('static', filename='images/' ~ produit.image_principale) }}" alt="{{ produit.nom }}" style="max-height: 100px; display: block; margin-bottom: 8px;">
    {% endif %}
    <input type="file" class="form-control" id="image" name="image" accept="image/*">
  </div>
  <div class="mb-3">
    <label for="images" class="form-label">Ajouter des images supplémentaires</label>
    <input type="file" class="form-control" id="images" name="images" accept="image/*" multiple>
  </div>
  <button type="submit" class="btn btn-primary">Modifier</button>
</form>
{% endblock %}
