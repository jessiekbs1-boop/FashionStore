{% extends "base.html" %}
{% block title %}Inscription{% endblock %}
{% block content %}
<h2>Inscription</h2>
<form method="POST" action="{{ url_for('auth.register') }}">
  <div class="mb-3">
    <label for="nom" class="form-label">Nom</label>
    <input type="text" class="form-control" id="nom" name="nom" required>
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" name="email" required>
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Mot de passe</label>
    <input type="password" class="form-control" id="password" name="password" required>
  </div>
  <div class="mb-3">
    <label for="role" class="form-label">Rôle</label>
    <select class="form-select" id="role" name="role" required>
      <option value="client">Client</option>
      <option value="vendeur">Vendeur</option>
      <option value="admin">Admin</option>
    </select>
  </div>
  <div class="mb-3">
    <label for="localisation" class="form-label">Localisation (ville)</label>
    <input type="text" class="form-control" id="localisation" name="localisation" placeholder="Ex: Lubumbashi">
  </div>
  <div class="mb-3 form-check">
    <input class="form-check-input" type="checkbox" id="terms_accepted" name="terms_accepted" required>
    <label class="form-check-label" for="terms_accepted">
      J'accepte les <a href="{{ url_for('auth.conditions') }}" target="_blank" rel="noopener">conditions d'utilisation</a>
    </label>
  </div>
  <button type="submit" class="btn btn-primary">S'inscrire</button>
</form>
<p class="mt-3">Déjà inscrit ? <a href="{{ url_for('auth.login') }}">Connectez-vous</a></p>
{% endblock %}
